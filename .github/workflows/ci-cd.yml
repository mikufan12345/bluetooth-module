name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - build-config
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build MakeCode extension
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PXT CLI and dependencies
        run: npm install pxt-microbit

      - name: Add micro-bit to pxt
        run: npx pxt target microbit

      - name: install PXT packages
        run: npx pxt install

      - name: Build extension
        run: npx pxt build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pxt-build-${{ github.run_id }}
          path: built/
          if-no-files-found: error

  release:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pxt-build-${{ github.run_id }}
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
